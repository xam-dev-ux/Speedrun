[profile.default]
src           = "src"
out           = "out"
libs          = ["lib"]
test          = "test"
script        = "script"
solc          = "0.8.25"
optimizer     = true
optimizer_runs = 200
via_ir        = false

[profile.local]
src           = "src"
out           = "out"
libs          = ["lib"]
solc          = "0.8.25"
optimizer     = true
optimizer_runs = 200
base          = true
sender        = "0x8F058fE6b568D97f85d517Ac441b52B95722fDDe"

[rpc_endpoints]
base_mainnet = "${BASE_MAINNET_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
local        = "http://127.0.0.1:8545"

[etherscan]
base_mainnet = { key = "${BASESCAN_API_KEY}", chain = 8453,  url = "https://api.basescan.org/api" }
base_sepolia = { key = "${BASESCAN_API_KEY}", chain = 84532, url = "https://api-sepolia.basescan.org/api" }
